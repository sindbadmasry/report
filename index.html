<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية جمعية مصر بكرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        [x-cloak] { display: none !important; }
        
        /* ضبط احتواء الأرقام بالكامل */
        .fit-content { width: 1%; white-space: nowrap; }

        @media print {
            @page { size: A4; margin: 10mm; }
            .no-print { display: none !important; }
            .print-header { display: flex !important; flex-direction: row !important; justify-content: space-between !important; align-items: center !important; border-bottom: 2px solid #334155; margin-bottom: 20px; padding-bottom: 10px; }
            body { background: white; padding: 0; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .table-container { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
            table { width: 100% !important; border-collapse: collapse !important; }
            th { background-color: #1e293b !important; color: white !important; }
            td, th { border: 1px solid #cbd5e1 !important; }
            .print-footer { display: flex !important; }
        }

        .print-header { display: none; }
        .print-footer { display: none; justify-content: space-between; margin-top: 50px; text-align: center; font-weight: bold; }
    </style>
</head>
<body x-data="budgetApp()" class="p-4 md:p-8">

    <div class="print-header px-4">
        <div class="text-right">
            <h1 class="text-2xl font-black text-slate-900">جمعية مصر بكرة للتنمية</h1>
            <p class="text-slate-600 font-bold">مشروع عرب أبو ساعد</p>
            <p class="text-sm mt-1" x-text="'ميزانية عام: ' + selectedYear"></p>
        </div>
        <div class="text-center">
            <img src="https://via.placeholder.com/80" alt="Logo" class="h-16 mx-auto mb-1">
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <div class="no-print bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-wrap justify-between items-center mb-6 gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-blue-50 p-2 rounded-lg text-blue-600"><i class="fa-solid fa-calendar-days"></i></div>
                <select x-model="selectedYear" class="border-2 border-slate-200 p-2 rounded-xl bg-slate-50 font-bold outline-none focus:border-blue-500">
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
            
            <div class="flex gap-2">
                <button @click="window.print()" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition flex items-center gap-2 shadow-lg shadow-slate-200">
                    <i class="fa-solid fa-print"></i> طباعة كـ PDF
                </button>
            </div>
        </div>

        <div class="no-print bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
            <h2 class="font-black text-lg text-slate-700 mb-5 flex items-center gap-2">
                <i class="fa-solid fa-circle-plus text-blue-500"></i> إضافة بند مالي جديد
            </h2>
            <form @submit.prevent="saveEntry" class="grid grid-cols-1 md:grid-cols-12 gap-3">
                <div class="md:col-span-3">
                    <input type="text" x-model="form.program" placeholder="اسم البرنامج (الوجبات..)" required class="w-full border-2 border-slate-100 p-3 rounded-xl bg-slate-50 focus:border-blue-400 outline-none">
                </div>
                <div class="md:col-span-4">
                    <input type="text" x-model="form.item" placeholder="البيان" required class="w-full border-2 border-slate-100 p-3 rounded-xl bg-slate-50 focus:border-blue-400 outline-none">
                </div>
                <div class="md:col-span-2">
                    <input type="number" x-model.number="form.count" placeholder="العدد" required class="w-full border-2 border-slate-100 p-3 rounded-xl bg-slate-50 text-center focus:border-blue-400 outline-none">
                </div>
                <div class="md:col-span-2">
                    <input type="number" x-model.number="form.price" placeholder="السعر" required class="w-full border-2 border-slate-100 p-3 rounded-xl bg-slate-50 text-center focus:border-blue-400 outline-none">
                </div>
                <div class="md:col-span-1">
                    <button class="w-full h-full bg-blue-600 text-white rounded-xl font-black hover:bg-blue-700 transition flex items-center justify-center">
                        <i x-show="!loading" class="fa-solid fa-check"></i>
                        <i x-show="loading" class="fa-solid fa-spinner fa-spin"></i>
                    </button>
                </div>
            </form>
        </div>

        <div class="table-container bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-slate-800 text-white">
                        <th class="p-4 border-l border-slate-700">البيان</th>
                        <th class="p-4 border-l border-slate-700 text-center fit-content">العدد</th>
                        <th class="p-4 border-l border-slate-700 text-center fit-content">السعر</th>
                        <th class="p-4 border-l border-slate-700 text-center fit-content">المبلغ</th>
                        <th class="p-4 no-print text-center w-24">إجراءات</th>
                    </tr>
                </thead>
                
                <template x-for="(group, programName) in groupedItems" :key="programName">
                    <tbody>
                        <tr class="bg-blue-50 border-b-2 border-blue-100">
                            <td colspan="5" class="p-4 font-black text-blue-900 text-lg">
                                <i class="fa-solid fa-folder-open ml-2 text-blue-400"></i>
                                <span x-text="programName"></span>
                            </td>
                        </tr>
                        
                        <template x-for="entry in group" :key="entry.id">
                            <tr class="border-b border-slate-50 hover:bg-slate-50 transition group">
                                <td class="p-4">
                                    <template x-if="editingId !== entry.id"><span class="font-bold text-slate-700" x-text="entry.item"></span></template>
                                    <template x-if="editingId === entry.id"><input type="text" x-model="entry.item" class="w-full border-2 border-blue-400 p-1 rounded"></template>
                                </td>
                                <td class="p-4 text-center fit-content">
                                    <template x-if="editingId !== entry.id"><span x-text="entry.count"></span></template>
                                    <template x-if="editingId === entry.id"><input type="number" x-model.number="entry.count" class="w-20 text-center border-2 border-blue-400 p-1 rounded"></template>
                                </td>
                                <td class="p-4 text-center fit-content">
                                    <template x-if="editingId !== entry.id"><span x-text="formatNumber(entry.price)"></span></template>
                                    <template x-if="editingId === entry.id"><input type="number" x-model.number="entry.price" class="w-20 text-center border-2 border-blue-400 p-1 rounded"></template>
                                </td>
                                <td class="p-4 text-center font-black text-slate-900 fit-content bg-slate-50/50" x-text="formatCurrency(entry.count * entry.price)"></td>
                                
                                <td class="p-4 no-print text-center whitespace-nowrap">
                                    <div class="flex gap-3 justify-center">
                                        <button @click="toggleEdit(entry)" class="transition-all" :class="editingId === entry.id ? 'text-green-600' : 'text-slate-400 hover:text-blue-600'">
                                            <i class="fa-solid" :class="editingId === entry.id ? 'fa-circle-check text-xl' : 'fa-pen-to-square'"></i>
                                        </button>
                                        <button @click="deleteEntry(entry.id)" class="text-slate-400 hover:text-red-500 transition-all">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                        
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <td colspan="3" class="p-4 text-left font-bold text-slate-500">إجمالي <span x-text="programName"></span></td>
                            <td class="p-4 text-center font-black text-blue-700 fit-content" x-text="formatCurrency(calculateSubtotal(group))"></td>
                            <td class="no-print"></td>
                        </tr>
                    </tbody>
                </template>

                <tfoot class="bg-white">
                    <tr class="border-t-2 border-slate-200">
                        <td colspan="3" class="p-5 text-left font-black text-lg text-slate-800">إجمالي البرامج</td>
                        <td class="p-5 text-center font-black text-xl text-slate-900 fit-content" x-text="formatCurrency(grandTotal)"></td>
                        <td class="no-print"></td>
                    </tr>
                    <tr class="text-slate-500 italic">
                        <td colspan="3" class="p-4 text-left font-bold">المصاريف الإدارية (10%)</td>
                        <td class="p-4 text-center font-bold fit-content" x-text="formatCurrency(adminFees)"></td>
                        <td class="no-print"></td>
                    </tr>
                    <tr class="bg-slate-900 text-white border-t-4 border-emerald-500">
                        <td colspan="3" class="p-6 text-left font-black text-2xl tracking-tighter">الإجمالي العام المستهدف</td>
                        <td class="p-6 text-center font-black text-3xl text-emerald-400 fit-content" x-text="formatCurrency(finalTotal)"></td>
                        <td class="no-print bg-slate-900"></td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="print-footer px-10">
            <div><p class="mb-14 italic">توقيع المحاسب</p><p>........................</p></div>
            <div><p class="mb-14 italic">مدير المشروع</p><p>........................</p></div>
            <div><p class="mb-14 italic">رئيس مجلس الإدارة</p><p>........................</p></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyGLE9l9rCYDa5GrFcNaTU5NMPQlFpBrh13vUJLuhHpxX1KyxlTfQFtNdQozfJpKup-/exec';

        function budgetApp() {
            return {
                loading: false,
                editingId: null,
                selectedYear: '2025',
                items: [],
                form: { program: '', item: '', count: '', price: '' },

                async init() {
                    await this.fetchData();
                    this.$watch('selectedYear', () => this.fetchData());
                },

                async fetchData() {
                    try {
                        const res = await fetch(API_URL);
                        const data = await res.json();
                        this.items = data.filter(i => i.year == this.selectedYear);
                    } catch (e) { console.error('Error fetching data'); }
                },

                get groupedItems() {
                    return this.items.reduce((acc, item) => {
                        (acc[item.program] = acc[item.program] || []).push(item);
                        return acc;
                    }, {});
                },

                get grandTotal() { return this.items.reduce((sum, i) => sum + (i.count * i.price), 0); },
                get adminFees() { return this.grandTotal * 0.10; },
                get finalTotal() { return this.grandTotal + this.adminFees; },
                calculateSubtotal(group) { return group.reduce((sum, i) => sum + (i.count * i.price), 0); },
                formatCurrency(val) { return Number(val).toLocaleString('ar-EG') + ' ج.م'; },
                formatNumber(val) { return Number(val).toLocaleString('ar-EG'); },

                async toggleEdit(entry) {
                    if (this.editingId === entry.id) {
                        // حفظ التعديلات
                        await this.updateEntry(entry);
                        this.editingId = null;
                    } else {
                        // الدخول في وضع التعديل
                        this.editingId = entry.id;
                    }
                },

                async saveEntry() {
                    this.loading = true;
                    const payload = {
                        action: 'save',
                        data: { ...this.form, year: this.selectedYear }
                    };
                    await this.apiCall(payload);
                    this.form = { program: '', item: '', count: '', price: '' };
                    await this.fetchData();
                    this.loading = false;
                },

                async updateEntry(entry) {
                    await this.apiCall({ action: 'save', data: entry });
                    await this.fetchData();
                },

                async deleteEntry(id) {
                    if (confirm('حذف هذا البند نهائياً؟')) {
                        await this.apiCall({ action: 'delete', id: id });
                        await this.fetchData();
                    }
                },

                async apiCall(payload) {
                    try {
                        await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(payload)
                        });
                    } catch (e) { console.error('API Error', e); }
                }
            }
        }
    </script>
</body>
</html>
