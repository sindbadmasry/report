<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800" x-data="financialApp()" x-init="init()">

    <div class="min-h-screen flex flex-col">
        <nav class="bg-blue-900 text-white p-4 shadow-lg">
            <div class="container mx-auto flex justify-between items-center">
                <span class="text-xl font-bold">نظام جمعية مصر بكرة المالي</span>
                <div class="flex gap-4">
                    <button @click="tab = 'payroll'" :class="tab === 'payroll' ? 'underline font-bold' : ''">المرتبات</button>
                    <button @click="tab = 'settlements'" :class="tab === 'settlements' ? 'underline font-bold' : ''">التسويات</button>
                    <button @click="tab = 'revenues'" :class="tab === 'revenues' ? 'underline font-bold' : ''">الإيرادات</button>
                </div>
            </div>
        </nav>

        <main class="container mx-auto p-6 flex-grow">
            <div x-show="tab === 'payroll'" class="bg-white rounded-xl shadow p-6">
                <h2 class="text-2xl mb-4 border-r-4 border-blue-600 pr-2">كشف المرتبات والتحويلات البنكية</h2>
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="p-3 border">الاسم</th>
                            <th class="p-3 border">الأساسي</th>
                            <th class="p-3 border">تأمينات</th>
                            <th class="p-3 border">ضرائب</th>
                            <th class="p-3 border">الصافي (البنك)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="emp in payrollData" :key="emp.name">
                            <tr class="hover:bg-blue-50 transition">
                                <td class="p-3 border" x-text="emp.name"></td>
                                <td class="p-3 border" x-text="emp.basic"></td>
                                <td class="p-3 border text-red-600" x-text="emp.insurance.toFixed(2)"></td>
                                <td class="p-3 border text-red-600" x-text="emp.taxes.toFixed(2)"></td>
                                <td class="p-3 border font-bold text-green-700" x-text="emp.net.toFixed(2)"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <div x-show="tab === 'settlements'" class="bg-white rounded-xl shadow p-6">
                <h2 class="text-2xl mb-4 border-r-4 border-green-600 pr-2">إضافة تسوية شهرية</h2>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" x-model="form.item" placeholder="البند (مثلاً: وجبات، انتقالات)" class="p-2 border rounded">
                    <select x-model="form.category" class="p-2 border rounded">
                        <option value="">اختر الكلمة الدلالية...</option>
                        <option value="تغذية">تغذية</option>
                        <option value="انتقالات">انتقالات</option>
                        <option value="ايجارات">إيجارات</option>
                        <option value="برامج">برامج تعليمية</option>
                    </select>
                    <input type="number" x-model="form.donorShare" placeholder="حصة الممول" class="p-2 border rounded">
                    <input type="number" x-model="form.assocShare" placeholder="حصة الجمعية" class="p-2 border rounded">
                    <button @click="save()" class="col-span-2 bg-green-600 text-white p-2 rounded hover:bg-green-700">حفظ البيانات</button>
                </div>
                <p x-text="statusMsg" class="mt-4 text-blue-600 font-bold"></p>
            </div>

            <div x-show="tab === 'revenues'" class="bg-white rounded-xl shadow p-6">
                <h2 class="text-2xl mb-4 border-r-4 border-yellow-600 pr-2">سجل الإيرادات</h2>
                <div class="grid grid-cols-1 gap-2">
                    <template x-for="rev in revenuesData">
                        <div class="flex justify-between p-3 border-b hover:bg-yellow-50">
                            <div>
                                <span class="font-bold" x-text="rev.donor"></span>
                                <p class="text-sm text-gray-500" x-text="rev.date"></p>
                            </div>
                            <span class="text-green-600 font-bold" x-text="rev.amount + ' ج.م'"></span>
                        </div>
                    </template>
                </div>
            </div>
        </main>
    </div>

    <script>
        function financialApp() {
            return {
                tab: 'payroll',
                payrollData: [],
                revenuesData: [],
                form: { item: '', category: '', donorShare: 0, assocShare: 0 },
                statusMsg: '',
                init() {
                    google.script.run.withSuccessHandler(d => this.payrollData = d).getPayrollData();
                    google.script.run.withSuccessHandler(d => this.revenuesData = d).getRevenuesData();
                },
                save() {
                    google.script.run.withSuccessHandler(msg => {
                        this.statusMsg = msg;
                        this.form = { item: '', category: '', donorShare: 0, assocShare: 0 };
                        this.init();
                    }).saveSettlement(this.form);
                }
            }
        }
    </script>
</body>
</html>
