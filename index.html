<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية جمعية مصر بكرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        [x-cloak] { display: none !important; }
        
        @media print {
            .no-print { display: none !important; }
            .print-header { display: block !important; }
            body { background: white; padding: 0; }
            .table-container { box-shadow: none; border: 1px solid black; }
            th { background-color: #f0f0f0 !important; color: black !important; border: 1px solid black; }
            td { border: 1px solid black; }
        }
        .print-header { display: none; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8" x-data="budgetApp()">

    <div class="print-header">
        <div class="flex justify-between items-center px-10">
            <div class="text-right">
                <h1 class="text-2xl font-black">جمعية مصر بكرة للتنمية</h1>
                <p>مشروع عرب أبو ساعد</p>
                <p x-text="'ميزانية عام: ' + selectedYear"></p>
            </div>
            <img src="https://via.placeholder.com/100" alt="Logo" class="h-20"> </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <div class="no-print flex flex-wrap justify-between items-center mb-6 gap-4 bg-white p-6 rounded-2xl shadow-sm">
            <div class="flex items-center gap-4">
                <label class="font-bold">سنة الميزانية:</label>
                <select x-model="selectedYear" class="border p-2 rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
            </div>
            
            <div class="flex gap-2">
                <button @click="isManualEdit = !isManualEdit" :class="isManualEdit ? 'bg-orange-500' : 'bg-gray-600'" 
                        class="text-white px-4 py-2 rounded-lg font-bold transition flex items-center gap-2">
                    <i class="fa-solid fa-pen-to-square"></i>
                    <span x-text="isManualEdit ? 'إيقاف التعديل' : 'تعديل يدوياً'"></span>
                </button>
                <button @click="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">
                    <i class="fa-solid fa-print ml-2"></i> طباعة الجدول
                </button>
            </div>
        </div>

        <div class="no-print bg-white p-6 rounded-2xl shadow-sm mb-8">
            <h2 class="font-black text-xl mb-4 border-b pb-2">إضافة بند مالي</h2>
            <form @submit.prevent="saveEntry" class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="text" x-model="form.program" placeholder="اسم البرنامج" required class="border p-3 rounded-xl bg-gray-50">
                <input type="text" x-model="form.item" placeholder="البيان" required class="border p-3 rounded-xl bg-gray-50">
                <input type="number" x-model.number="form.count" placeholder="العدد" required class="border p-3 rounded-xl bg-gray-50">
                <input type="number" x-model.number="form.price" placeholder="السعر" required class="border p-3 rounded-xl bg-gray-50">
                <button class="bg-green-600 text-white rounded-xl font-black hover:bg-green-700 transition">
                    <span x-show="!loading">إضافة للجدول</span>
                    <i x-show="loading" class="fa-solid fa-spinner fa-spin"></i>
                </button>
            </form>
        </div>

        <div class="table-container bg-white rounded-2xl shadow-lg overflow-hidden">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-slate-800 text-white">
                        <th class="p-4 border-l border-slate-700">البيان</th>
                        <th class="p-4 border-l border-slate-700">العدد</th>
                        <th class="p-4 border-l border-slate-700">السعر</th>
                        <th class="p-4 border-l border-slate-700">المبلغ</th>
                        <th class="p-4 no-print">إجراءات</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(group, programName) in groupedItems" :key="programName">
                        <template x-if="group.length > 0">
                            <tbody>
                                <tr class="bg-blue-100 border-b-2 border-blue-200">
                                    <td colspan="5" class="p-3 font-black text-blue-900 text-lg">
                                        <span x-text="programName"></span>
                                    </td>
                                </tr>
                                <template x-for="entry in group" :key="entry.id">
                                    <tr class="border-b hover:bg-gray-50 transition">
                                        <td class="p-3">
                                            <template x-if="!isManualEdit"><span x-text="entry.item"></span></template>
                                            <template x-if="isManualEdit"><input type="text" x-model="entry.item" @change="updateEntry(entry)" class="w-full border p-1 rounded"></template>
                                        </td>
                                        <td class="p-3">
                                            <template x-if="!isManualEdit"><span x-text="entry.count"></span></template>
                                            <template x-if="isManualEdit"><input type="number" x-model.number="entry.count" @change="updateEntry(entry)" class="w-full border p-1 rounded"></template>
                                        </td>
                                        <td class="p-3">
                                            <template x-if="!isManualEdit"><span x-text="entry.price"></span></template>
                                            <template x-if="isManualEdit"><input type="number" x-model.number="entry.price" @change="updateEntry(entry)" class="w-full border p-1 rounded"></template>
                                        </td>
                                        <td class="p-3 font-bold" x-text="formatCurrency(entry.count * entry.price)"></td>
                                        <td class="p-3 no-print text-center">
                                            <button @click="deleteEntry(entry.id)" class="text-red-500 hover:scale-110 transition"><i class="fa-solid fa-trash"></i></button>
                                        </td>
                                    </tr>
                                </template>
                                <tr class="bg-gray-50">
                                    <td colspan="3" class="p-3 text-left font-bold text-gray-600">إجمالي <span x-text="programName"></span></td>
                                    <td class="p-3 font-black text-blue-700" x-text="formatCurrency(calculateSubtotal(group))"></td>
                                    <td class="no-print"></td>
                                </tr>
                            </tbody>
                        </template>
                    </template>
                </tbody>
                <tfoot class="border-t-4 border-double border-slate-800 bg-slate-50">
                    <tr>
                        <td colspan="3" class="p-4 text-left font-black text-lg">إجمالي كافة البرامج</td>
                        <td class="p-4 font-black text-lg" x-text="formatCurrency(grandTotal)"></td>
                        <td class="no-print"></td>
                    </tr>
                    <tr class="text-gray-600 italic">
                        <td colspan="3" class="p-4 text-left font-bold">المصاريف الإدارية (10%)</td>
                        <td class="p-4 font-bold" x-text="formatCurrency(adminFees)"></td>
                        <td class="no-print"></td>
                    </tr>
                    <tr class="bg-slate-800 text-white">
                        <td colspan="3" class="p-5 text-left font-black text-xl uppercase tracking-widest">الإجمالي العام المستهدف</td>
                        <td class="p-5 font-black text-2xl" x-text="formatCurrency(finalTotal)"></td>
                        <td class="no-print"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'رابط_الـ_DEPLOY_الخاص_بك_هنا';

        function budgetApp() {
            return {
                loading: false,
                isManualEdit: false,
                selectedYear: '2025',
                items: [],
                form: { program: '', item: '', count: '', price: '' },

                async init() {
                    await this.fetchData();
                    this.$watch('selectedYear', () => this.fetchData());
                },

                async fetchData() {
                    try {
                        const res = await fetch(API_URL);
                        const data = await res.json();
                        // فلترة البيانات حسب السنة المختارة فقط
                        this.items = data.filter(i => i.year == this.selectedYear);
                    } catch (e) { alert('خطأ في جلب البيانات'); }
                },

                get groupedItems() {
                    return this.items.reduce((acc, item) => {
                        if (!acc[item.program]) acc[item.program] = [];
                        acc[item.program].push(item);
                        return acc;
                    }, {});
                },

                get grandTotal() {
                    return this.items.reduce((sum, i) => sum + (i.count * i.price), 0);
                },

                get adminFees() { return this.grandTotal * 0.10; },
                get finalTotal() { return this.grandTotal + this.adminFees; },

                calculateSubtotal(group) {
                    return group.reduce((sum, i) => sum + (i.count * i.price), 0);
                },

                formatCurrency(val) {
                    return Number(val).toLocaleString('ar-EG') + ' ج.م';
                },

                async saveEntry() {
                    this.loading = true;
                    const payload = {
                        action: 'save',
                        data: { ...this.form, year: this.selectedYear, total: this.form.count * this.form.price }
                    };
                    await this.apiCall(payload);
                    this.form = { program: '', item: '', count: '', price: '' };
                    await this.fetchData();
                    this.loading = false;
                },

                async updateEntry(entry) {
                    entry.total = entry.count * entry.price;
                    await this.apiCall({ action: 'save', data: entry });
                },

                async deleteEntry(id) {
                    if (confirm('حذف هذا البند؟')) {
                        await this.apiCall({ action: 'delete', id: id });
                        await this.fetchData();
                    }
                },

                async apiCall(payload) {
                    try {
                        await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(payload)
                        });
                    } catch (e) { console.error(e); }
                }
            }
        }
    </script>
</body>
</html>
