<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية جمعية مصر بكرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f4f8; color: #334155; }
        [x-cloak] { display: none !important; }

        /* تنسيق الأرقام لعرض كامل المحتوى */
        .num-cell { width: 1%; white-space: nowrap; padding-left: 1.5rem !important; padding-right: 1.5rem !important; }

        /* التجاوب مع الهاتف */
        @media (max-width: 768px) {
            .mobile-card { display: block; border-bottom: 2px solid #e2e8f0; margin-bottom: 1rem; padding: 1rem; background: white; border-radius: 12px; }
            .desktop-table { display: none; }
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .print-area { width: 210mm; min-height: 297mm; padding: 10mm; margin: auto; }
            table { width: 100% !important; border-collapse: collapse; }
            th, td { border: 1px solid #cbd5e1 !important; padding: 8px !important; }
            .num-cell { width: auto; }
        }
    </style>
</head>
<body x-data="budgetApp()" class="antialiased">

    <div class="print-area max-w-6xl mx-auto py-6 px-4">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 border-b pb-6 border-slate-200">
            <div class="text-center md:text-right">
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">جمعية مصر بكرة للتنمية</h1>
                <p class="text-cyan-600 font-bold text-lg mt-1">مشروع عرب أبو ساعد</p>
                <div class="mt-4 no-print inline-flex items-center bg-white border rounded-full px-4 py-1 shadow-sm">
                    <span class="text-sm font-bold ml-2">العام المالي:</span>
                    <input type="number" x-model="selectedYear" class="w-20 bg-transparent border-none focus:ring-0 font-black text-slate-700">
                </div>
            </div>
            <div class="no-print flex gap-2">
                <button @click="window.print()" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-slate-700 transition flex items-center gap-2">
                    <i class="fa-solid fa-print"></i> طباعة A4
                </button>
            </div>
        </header>

        <section class="no-print bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/50 border border-white mb-8">
            <h2 class="font-bold text-slate-500 mb-6 flex items-center gap-2">
                <span class="w-2 h-6 bg-cyan-500 rounded-full"></span> إضافة بند للميزانية
            </h2>
            <form @submit.prevent="saveEntry" class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <div class="md:col-span-3">
                    <input type="text" x-model="form.program" placeholder="البرنامج" required class="w-full bg-slate-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-cyan-500 transition outline-none">
                </div>
                <div class="md:col-span-4">
                    <input type="text" x-model="form.item" placeholder="البيان" required class="w-full bg-slate-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-cyan-500 transition outline-none">
                </div>
                <div class="md:col-span-2">
                    <input type="number" x-model.number="form.count" placeholder="العدد" required class="w-full bg-slate-50 border-none rounded-2xl p-4 text-center focus:ring-2 focus:ring-cyan-500 transition outline-none">
                </div>
                <div class="md:col-span-2">
                    <input type="number" x-model.number="form.price" placeholder="السعر" required class="w-full bg-slate-50 border-none rounded-2xl p-4 text-center focus:ring-2 focus:ring-cyan-500 transition outline-none">
                </div>
                <div class="md:col-span-1">
                    <button type="submit" :disabled="loading" class="w-full h-full bg-cyan-500 text-white rounded-2xl hover:bg-cyan-600 transition shadow-lg shadow-cyan-200 flex items-center justify-center text-xl">
                        <i x-show="!loading" class="fa-solid fa-plus"></i>
                        <i x-show="loading" class="fa-solid fa-spinner fa-spin"></i>
                    </button>
                </div>
            </form>
        </section>

        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-white overflow-hidden overflow-x-auto">
            <table class="w-full desktop-table">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr class="text-slate-400 text-sm uppercase">
                        <th class="p-5 text-right font-black">البيان</th>
                        <th class="p-5 text-center font-black num-cell">العدد</th>
                        <th class="p-5 text-center font-black num-cell">السعر</th>
                        <th class="p-5 text-center font-black num-cell">المجموع</th>
                        <th class="p-5 text-center font-black no-print"></th>
                    </tr>
                </thead>
                <template x-for="(group, program) in groupedItems" :key="program">
                    <tbody>
                        <tr class="bg-cyan-50/30">
                            <td colspan="5" class="p-4 font-black text-cyan-700 border-r-4 border-cyan-500">
                                <i class="fa-solid fa-folder ml-2"></i> <span x-text="program"></span>
                            </td>
                        </tr>
                        <template x-for="entry in group" :key="entry.id">
                            <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition group">
                                <td class="p-5 font-bold text-slate-700" x-text="entry.item"></td>
                                <td class="p-5 text-center font-bold text-slate-500 num-cell" x-text="entry.count"></td>
                                <td class="p-5 text-center font-bold text-slate-500 num-cell" x-text="formatNumber(entry.price)"></td>
                                <td class="p-5 text-center font-black text-slate-800 num-cell bg-slate-50/30" x-text="formatNumber(entry.count * entry.price)"></td>
                                <td class="p-5 text-center no-print">
                                    <button @click="deleteEntry(entry.id)" class="text-slate-300 hover:text-red-500 transition opacity-0 group-hover:opacity-100">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </td>
                            </tr>
                        </template>
                        <tr class="bg-slate-50/50">
                            <td colspan="3" class="p-4 text-left font-bold text-slate-400">إجمالي <span x-text="program"></span></td>
                            <td class="p-4 text-center font-black text-cyan-600 num-cell" x-text="formatNumber(calculateSubtotal(group))"></td>
                            <td class="no-print"></td>
                        </tr>
                    </tbody>
                </template>
            </table>

            <div class="md:hidden no-print">
                <template x-for="(group, program) in groupedItems" :key="program">
                    <div class="mb-4">
                        <div class="bg-cyan-500 text-white p-3 font-bold rounded-t-xl" x-text="program"></div>
                        <template x-for="entry in group" :key="entry.id">
                            <div class="mobile-card">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="font-black text-slate-700" x-text="entry.item"></span>
                                    <button @click="deleteEntry(entry.id)" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                                </div>
                                <div class="flex justify-between text-sm text-slate-500">
                                    <span>العدد: <b x-text="entry.count"></b></span>
                                    <span>السعر: <b x-text="formatNumber(entry.price)"></b></span>
                                    <span class="text-slate-800">المجموع: <b x-text="formatNumber(entry.count * entry.price)"></b></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <div class="p-8 bg-slate-800 text-white">
                <div class="flex flex-col gap-4 max-w-sm mr-auto">
                    <div class="flex justify-between items-center text-slate-400">
                        <span>إجمالي البرامج</span>
                        <span class="font-bold text-xl" x-text="formatNumber(grandTotal)"></span>
                    </div>
                    <div class="flex justify-between items-center text-slate-400">
                        <span>مصاريف إدارية (10%)</span>
                        <span class="font-bold text-xl" x-text="formatNumber(adminFees)"></span>
                    </div>
                    <div class="h-px bg-slate-700 my-2"></div>
                    <div class="flex justify-between items-center">
                        <span class="text-lg font-bold">الإجمالي العام</span>
                        <span class="text-4xl font-black text-cyan-400" x-text="formatNumber(finalTotal)"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="hidden print:flex justify-between mt-20 text-center font-bold px-10">
            <div><p class="mb-16 italic">توقيع المحاسب</p><div class="w-40 h-px bg-black mx-auto"></div></div>
            <div><p class="mb-16 italic">مدير المشروع</p><div class="w-40 h-px bg-black mx-auto"></div></div>
            <div><p class="mb-16 italic">رئيس مجلس الإدارة</p><div class="w-40 h-px bg-black mx-auto"></div></div>
        </div>
    </div>

    <script>
        // استبدل هذا الرابط برابط الـ Web App الخاص بك بعد النشر
        const API_URL = 'https://script.google.com/macros/s/AKfycbyGLE9l9rCYDa5GrFcNaTU5NMPQlFpBrh13vUJLuhHpxX1KyxlTfQFtNdQozfJpKup-/exec';

        function budgetApp() {
            return {
                loading: false,
                selectedYear: new Date().getFullYear(),
                items: [],
                form: { program: '', item: '', count: '', price: '' },
                async init() {
                    await this.fetchData();
                    this.$watch('selectedYear', () => this.fetchData());
                },
                async fetchData() {
                    try {
                        const res = await fetch(API_URL);
                        const data = await res.json();
                        this.items = data.filter(i => i.year == this.selectedYear);
                    } catch (e) { console.error('Data Fetch Error', e); }
                },
                get groupedItems() {
                    return this.items.reduce((acc, item) => {
                        (acc[item.program] = acc[item.program] || []).push(item);
                        return acc;
                    }, {});
                },
                get grandTotal() { return this.items.reduce((s, i) => s + (i.count * i.price), 0); },
                get adminFees() { return this.grandTotal * 0.10; },
                get finalTotal() { return this.grandTotal + this.adminFees; },
                calculateSubtotal(g) { return g.reduce((s, i) => s + (i.count * i.price), 0); },
                formatNumber(n) { return Number(n).toLocaleString('ar-EG'); },

                async saveEntry() {
                    this.loading = true;
                    try {
                        const payload = {
                            action: 'save',
                            data: { ...this.form, year: this.selectedYear }
                        };
                        // إرسال كـ text/plain لتجنب مشاكل الـ CORS في بعض المتصفحات
                        await fetch(API_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify(payload)
                        });
                        this.form = { program: '', item: '', count: '', price: '' };
                        // انتظار بسيط قبل التحديث لضمان تسجيل البيانات في جوجل
                        setTimeout(() => this.fetchData(), 1500);
                    } finally { this.loading = false; }
                },
                async deleteEntry(id) {
                    if (!confirm('حذف هذا البند؟')) return;
                    await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: 'delete', id: id })
                    });
                    setTimeout(() => this.fetchData(), 1000);
                }
            }
        }
    </script>
</body>
</html>
