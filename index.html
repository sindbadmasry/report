<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة البرامج والبيانات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Segoe UI', 'Tahoma', 'sans-serif'] } } }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .fade-enter { opacity: 0; transform: translateY(-10px); }
        .fade-enter-active { transition: all 0.3s ease; opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen">

    <div x-data="tableManager()" x-init="initApp()" class="max-w-7xl mx-auto p-4 md:p-8">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-3xl font-black text-blue-600 dark:text-blue-400 flex items-center gap-3">
                <i class="fa-solid fa-chart-pie"></i> نظام إدارة الميزانيات
            </h1>
            <div class="flex items-center gap-3">
                <button @click="exportCSV()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-xl shadow-lg transition-all flex items-center gap-2 font-bold">
                    <i class="fa-solid fa-file-export"></i> تصدير البيانات
                </button>
                <button @click="toggleDarkMode()" class="p-3 rounded-xl bg-white dark:bg-gray-800 shadow-md hover:scale-105 transition-transform">
                    <i class="fa-solid text-xl" :class="isDark ? 'fa-sun text-yellow-400' : 'fa-moon text-blue-600'"></i>
                </button>
            </div>
        </header>

        <div x-show="toast.show" x-cloak x-transition class="fixed top-10 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-2xl shadow-2xl text-white font-bold flex items-center gap-3"
             :class="toast.type === 'success' ? 'bg-green-500' : 'bg-red-500'">
            <i class="fa-solid" :class="toast.type === 'success' ? 'fa-circle-check' : 'fa-circle-xmark'"></i>
            <span x-text="toast.message"></span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4">
                <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700 sticky top-8">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-gray-700 dark:text-gray-200">
                        <i class="fa-solid fa-circle-plus text-blue-500"></i>
                        <span x-text="form.id ? 'تعديل البيانات' : 'إضافة بيان جديد'"></span>
                    </h2>
                    
                    <form @submit.prevent="saveEntry" class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold mb-2">اسم البرنامج</label>
                            <input type="text" x-model="form.program" required placeholder="ادخل اسم البرنامج..."
                                   class="w-full p-3.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 focus:ring-4 focus:ring-blue-500/20 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">اسم البيان</label>
                            <input type="text" x-model="form.item" required placeholder="وصف البيان..."
                                   class="w-full p-3.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 focus:ring-4 focus:ring-blue-500/20 outline-none transition">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold mb-2">العدد</label>
                                <input type="number" step="any" x-model.number="form.count" required
                                       class="w-full p-3.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 focus:ring-4 focus:ring-blue-500/20 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">السعر</label>
                                <input type="number" step="any" x-model.number="form.price" required
                                       class="w-full p-3.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 focus:ring-4 focus:ring-blue-500/20 outline-none transition">
                            </div>
                        </div>
                        
                        <div class="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-2xl border border-blue-100 dark:border-blue-800 flex justify-between items-center">
                            <span class="font-bold text-blue-800 dark:text-blue-300">المجموع:</span>
                            <span class="text-xl font-black text-blue-700 dark:text-blue-400" x-text="formatCurrency(calculatedTotal)"></span>
                        </div>

                        <div class="flex gap-2">
                            <button type="submit" :disabled="loading" 
                                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-500/30 transition-all disabled:opacity-50">
                                <span x-show="!loading" x-text="form.id ? 'حفظ التعديلات' : 'إضافة للجدول'"></span>
                                <i x-show="loading" class="fa-solid fa-spinner fa-spin"></i>
                            </button>
                            <button type="button" x-show="form.id" @click="resetForm()" 
                                    class="bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 px-6 py-4 rounded-2xl font-bold transition">
                                إلغاء
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700">
                    
                    <div class="flex flex-col md:flex-row gap-4 justify-between items-center mb-8">
                        <div class="relative w-full md:w-1/2">
                            <i class="fa-solid fa-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" x-model="searchQuery" placeholder="بحث في البرامج أو البيانات..."
                                   class="w-full p-3 pr-12 rounded-2xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 px-6 py-3 rounded-2xl font-black border border-indigo-100 dark:border-indigo-800">
                            الإجمالي العام: <span x-text="formatCurrency(grandTotal)"></span>
                        </div>
                    </div>

                    <div class="overflow-x-auto rounded-2xl border border-gray-100 dark:border-gray-700">
                        <table class="w-full text-right border-collapse">
                            <thead>
                                <tr class="bg-gray-50 dark:bg-gray-700/50 text-gray-600 dark:text-gray-300 border-b dark:border-gray-700">
                                    <th class="p-4 cursor-pointer hover:text-blue-500 transition" @click="sortBy('item')">البيان <i class="fa-solid fa-sort text-[10px] opacity-50"></i></th>
                                    <th class="p-4">العدد</th>
                                    <th class="p-4">السعر</th>
                                    <th class="p-4 text-left">المبلغ</th>
                                    <th class="p-4 text-center">الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-if="isFetching">
                                    <tr><td colspan="5" class="p-20 text-center"><i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500"></i></td></tr>
                                </template>
                                
                                <template x-for="(group, programName) in groupedItems" :key="programName">
                                    <tbody class="border-b-4 border-gray-50 dark:border-gray-900">
                                        <tr class="bg-blue-50/50 dark:bg-blue-900/20">
                                            <td colspan="5" class="p-4 font-black text-blue-800 dark:text-blue-300 border-r-4 border-blue-500">
                                                <i class="fa-solid fa-folder-tree ml-2"></i> <span x-text="programName"></span>
                                            </td>
                                        </tr>
                                        <template x-for="entry in group" :key="entry.id">
                                            <tr class="border-b dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors">
                                                <td class="p-4 font-medium" x-text="entry.item"></td>
                                                <td class="p-4 text-gray-500" x-text="entry.count"></td>
                                                <td class="p-4 text-gray-500" x-text="formatCurrency(entry.price)"></td>
                                                <td class="p-4 font-bold text-left" x-text="formatCurrency(entry.total)"></td>
                                                <td class="p-4 text-center space-x-2 space-x-reverse">
                                                    <button @click="editEntry(entry)" class="text-blue-500 hover:scale-120 p-2"><i class="fa-solid fa-pen-to-square"></i></button>
                                                    <button @click="deleteEntry(entry.id)" class="text-red-400 hover:scale-120 p-2"><i class="fa-solid fa-trash-can"></i></button>
                                                </td>
                                            </tr>
                                        </template>
                                        <tr class="bg-gray-50 dark:bg-gray-800/40">
                                            <td colspan="3" class="p-4 text-left font-bold text-gray-500">إجمالي <span x-text="programName"></span>:</td>
                                            <td colspan="2" class="p-4 text-left font-black text-green-600 dark:text-green-400" x-text="formatCurrency(calculateSubtotal(group))"></td>
                                        </tr>
                                    </tbody>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // رابط الـ Backend الخاص بك
        const API_URL = 'https://script.google.com/macros/s/AKfycbzYuAZFaIzh3xU2mOc-t3xwv6gREe8CpWc1_UK-YqD0ifjbc0mfaj13VMew1yyD1xre/exec';

        function tableManager() {
            return {
                isDark: false,
                loading: false,
                isFetching: true,
                items: [],
                searchQuery: '',
                sortCol: 'item',
                sortAsc: true,
                form: { id: null, program: '', item: '', count: '', price: '' },
                toast: { show: false, message: '', type: 'success' },

                async initApp() {
                    // الوضع الليلي الافتراضي حسب إعدادات الجهاز
                    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                        this.isDark = true;
                        document.documentElement.classList.add('dark');
                    }
                    await this.fetchData();
                },

                async fetchData() {
                    this.isFetching = true;
                    try {
                        const res = await fetch(API_URL);
                        this.items = await res.json();
                    } catch (e) {
                        this.showToast('فشل في جلب البيانات', 'error');
                    } finally {
                        this.isFetching = false;
                    }
                },

                toggleDarkMode() {
                    this.isDark = !this.isDark;
                    document.documentElement.classList.toggle('dark');
                },

                get calculatedTotal() {
                    return (parseFloat(this.form.count) || 0) * (parseFloat(this.form.price) || 0);
                },

                get groupedItems() {
                    let filtered = this.items.filter(i => 
                        i.program.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                        i.item.toLowerCase().includes(this.searchQuery.toLowerCase())
                    );
                    
                    filtered.sort((a, b) => {
                        let valA = a[this.sortCol], valB = b[this.sortCol];
                        if (valA < valB) return this.sortAsc ? -1 : 1;
                        if (valA > valB) return this.sortAsc ? 1 : -1;
                        return 0;
                    });

                    return filtered.reduce((groups, item) => {
                        if (!groups[item.program]) groups[item.program] = [];
                        groups[item.program].push(item);
                        return groups;
                    }, {});
                },

                get grandTotal() {
                    return this.items.reduce((sum, i) => sum + (parseFloat(i.total) || 0), 0);
                },

                calculateSubtotal(group) {
                    return group.reduce((sum, i) => sum + (parseFloat(i.total) || 0), 0);
                },

                formatCurrency(val) {
                    return Number(val).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ج.م';
                },

                sortBy(col) {
                    if (this.sortCol === col) this.sortAsc = !this.sortAsc;
                    else { this.sortCol = col; this.sortAsc = true; }
                },

                showToast(msg, type = 'success') {
                    this.toast = { show: true, message: msg, type: type };
                    setTimeout(() => this.toast.show = false, 3000);
                },

                resetForm() {
                    this.form = { id: null, program: '', item: '', count: '', price: '' };
                },

                editEntry(entry) {
                    this.form = { ...entry };
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                async saveEntry() {
                    this.loading = true;
                    const payload = {
                        action: 'save',
                        data: { ...this.form, total: this.calculatedTotal }
                    };

                    try {
                        const res = await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(payload)
                        });
                        const result = await res.json();
                        
                        if (result.success) {
                            if (this.form.id) {
                                const index = this.items.findIndex(i => i.id === result.data.id);
                                this.items[index] = result.data;
                                this.showToast('تم تحديث البيانات');
                            } else {
                                this.items.push(result.data);
                                this.showToast('تمت الإضافة بنجاح');
                            }
                            this.resetForm();
                        }
                    } catch (e) {
                        this.showToast('خطأ في الاتصال بالخادم', 'error');
                    } finally {
                        this.loading = false;
                    }
                },

                async deleteEntry(id) {
                    if (!confirm('هل أنت متأكد من الحذف؟')) return;
                    try {
                        const res = await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ action: 'delete', id: id })
                        });
                        const result = await res.json();
                        if (result.success) {
                            this.items = this.items.filter(i => i.id !== id);
                            this.showToast('تم الحذف بنجاح');
                        }
                    } catch (e) {
                        this.showToast('فشل في الحذف', 'error');
                    }
                },

                exportCSV() {
                    if (!this.items.length) return;
                    let csv = '\uFEFFالبرنامج,البيان,العدد,السعر,المجموع\n';
                    Object.keys(this.groupedItems).forEach(prog => {
                        this.groupedItems[prog].forEach(row => {
                            csv += `${row.program},${row.item},${row.count},${row.price},${row.total}\n`;
                        });
                        csv += `إجمالي ${prog},,,,${this.calculateSubtotal(this.groupedItems[prog])}\n`;
                    });
                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `Budget_Report_${new Date().toISOString().split('T')[0]}.csv`;
                    link.click();
                }
            }
        }
    </script>
</body>
</html>
