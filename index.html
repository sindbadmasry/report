<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية جمعية مصر بكرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        [x-cloak] { display: none !important; }

        @page { size: A4; margin: 15mm; }

        @media print {
            body { background: white; padding: 0; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .no-print { display: none !important; }
            .print-header { display: flex !important; }
            table { page-break-inside: auto; border: 1px solid #e2e8f0; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            .table-container { box-shadow: none !important; border-radius: 0; }
        }

        .print-header { display: none; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 3px solid #0f172a; padding-bottom: 1rem; }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-800" x-data="budgetApp()">

    <div class="print-header">
        <div class="text-right">
            <h1 class="text-3xl font-black text-slate-900 mb-1">جمعية مصر بكرة للتنمية</h1>
            <p class="text-lg font-bold text-slate-600">مشروع عرب أبو ساعد</p>
            <p class="text-md font-medium text-slate-500 mt-2" x-text="'ميزانية عام: ' + selectedYear"></p>
        </div>
        <img src="https://via.placeholder.com/120?text=Logo" alt="الشعار" class="h-24 rounded-lg"> 
    </div>

    <div class="max-w-7xl mx-auto">
        
        <div class="no-print bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap justify-between items-center mb-6 gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-blue-50 p-3 rounded-xl text-blue-600">
                    <i class="fa-solid fa-calendar-check text-xl"></i>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-500 mb-1">السنة المالية</label>
                    <input type="number" x-model="selectedYear" class="border-2 border-slate-200 focus:border-blue-500 focus:ring-0 px-4 py-2 rounded-lg bg-slate-50 w-48 font-bold text-slate-900 transition outline-none">
                </div>
            </div>
            
            <div class="flex gap-3">
                <button @click="isManualEdit = !isManualEdit" 
                        :class="isManualEdit ? 'bg-amber-500 hover:bg-amber-600 text-white shadow-amber-200' : 'bg-slate-100 hover:bg-slate-200 text-slate-700'" 
                        class="px-5 py-2.5 rounded-xl font-bold transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid" :class="isManualEdit ? 'fa-pen-slash' : 'fa-pen-to-square'"></i>
                    <span x-text="isManualEdit ? 'إيقاف التعديل' : 'تعديل السجلات'"></span>
                </button>
                <button @click="window.print()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition-all flex items-center gap-2 shadow-md shadow-blue-200">
                    <i class="fa-solid fa-print"></i> طباعة A4
                </button>
            </div>
        </div>

        <div class="no-print bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h2 class="font-black text-xl text-slate-800 mb-5 flex items-center gap-2">
                <i class="fa-solid fa-circle-plus text-blue-600"></i> تسجيل بند مالي
            </h2>
            <form @submit.prevent="saveEntry" class="flex flex-wrap md:flex-nowrap gap-4">
                <input type="text" x-model="form.program" placeholder="البرنامج (مثال: الوجبات)" required class="w-full md:w-1/4 border-2 border-slate-200 focus:border-blue-500 p-3.5 rounded-xl bg-slate-50 outline-none transition">
                <input type="text" x-model="form.item" placeholder="البيان" required class="w-full md:w-2/4 border-2 border-slate-200 focus:border-blue-500 p-3.5 rounded-xl bg-slate-50 outline-none transition">
                <input type="number" x-model.number="form.count" placeholder="العدد" required class="w-full md:w-32 border-2 border-slate-200 focus:border-blue-500 p-3.5 rounded-xl bg-slate-50 outline-none transition text-center">
                <input type="number" x-model.number="form.price" placeholder="السعر" required class="w-full md:w-32 border-2 border-slate-200 focus:border-blue-500 p-3.5 rounded-xl bg-slate-50 outline-none transition text-center">
                <button type="submit" :disabled="loading" class="w-full md:w-auto px-6 bg-emerald-500 text-white rounded-xl font-black hover:bg-emerald-600 transition disabled:opacity-70 flex items-center justify-center text-lg shadow-md shadow-emerald-200">
                    <span x-show="!loading"><i class="fa-solid fa-check"></i></span>
                    <i x-show="loading" class="fa-solid fa-spinner fa-spin"></i>
                </button>
            </form>
        </div>

        <div class="table-container bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
            <table class="w-full text-right border-collapse">
                <thead class="bg-slate-900 text-white">
                    <tr>
                        <th class="p-4 font-bold text-sm w-full border-l border-slate-700">البيان</th>
                        <th class="p-4 font-bold text-sm whitespace-nowrap w-px border-l border-slate-700 text-center">العدد</th>
                        <th class="p-4 font-bold text-sm whitespace-nowrap w-px border-l border-slate-700 text-center">السعر</th>
                        <th class="p-4 font-bold text-sm whitespace-nowrap w-px border-l border-slate-700 text-center">المبلغ</th>
                        <th class="p-4 font-bold text-sm whitespace-nowrap w-px no-print text-center">إجراءات</th>
                    </tr>
                </thead>
                
                <template x-for="(group, programName) in groupedItems" :key="programName">
                    <tbody x-show="group.length > 0">
                        <tr class="bg-blue-50 border-y border-blue-100">
                            <td colspan="5" class="p-4 font-black text-blue-800 text-lg">
                                <i class="fa-solid fa-folder-open text-blue-500 ml-2"></i><span x-text="programName"></span>
                            </td>
                        </tr>
                        
                        <template x-for="entry in group" :key="entry.id">
                            <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                                <td class="p-4">
                                    <template x-if="!isManualEdit"><span class="font-medium text-slate-700" x-text="entry.item"></span></template>
                                    <template x-if="isManualEdit"><input type="text" x-model="entry.item" @change="updateEntry(entry)" class="w-full border-2 border-slate-300 p-2 rounded-lg focus:border-blue-500 outline-none"></template>
                                </td>
                                <td class="p-4 text-center whitespace-nowrap w-px">
                                    <template x-if="!isManualEdit"><span class="font-bold text-slate-600" x-text="entry.count"></span></template>
                                    <template x-if="isManualEdit"><input type="number" x-model.number="entry.count" @change="updateEntry(entry)" class="w-24 text-center border-2 border-slate-300 p-2 rounded-lg outline-none"></template>
                                </td>
                                <td class="p-4 text-center whitespace-nowrap w-px">
                                    <template x-if="!isManualEdit"><span class="font-bold text-slate-600" x-text="entry.price"></span></template>
                                    <template x-if="isManualEdit"><input type="number" x-model.number="entry.price" @change="updateEntry(entry)" class="w-24 text-center border-2 border-slate-300 p-2 rounded-lg outline-none"></template>
                                </td>
                                <td class="p-4 text-center font-black text-slate-800 bg-slate-50/50 whitespace-nowrap w-px" x-text="formatCurrency(entry.count * entry.price)"></td>
                                <td class="p-4 no-print text-center whitespace-nowrap w-px">
                                    <button @click="deleteEntry(entry.id)" class="text-slate-400 hover:text-red-500 transition-colors p-2"><i class="fa-solid fa-trash-can"></i></button>
                                </td>
                            </tr>
                        </template>
                        
                        <tr class="bg-slate-50 border-b-2 border-slate-200">
                            <td colspan="3" class="p-4 text-left font-bold text-slate-500">إجمالي <span x-text="programName"></span></td>
                            <td class="p-4 text-center font-black text-blue-700 whitespace-nowrap w-px" x-text="formatCurrency(calculateSubtotal(group))"></td>
                            <td class="no-print"></td>
                        </tr>
                    </tbody>
                </template>

                <tfoot class="bg-white">
                    <tr class="border-t border-slate-200">
                        <td colspan="3" class="p-5 text-left font-black text-slate-700 text-lg">إجمالي البرامج</td>
                        <td class="p-5 text-center font-black text-slate-800 text-xl whitespace-nowrap w-px" x-text="formatCurrency(grandTotal)"></td>
                        <td class="no-print"></td>
                    </tr>
                    <tr class="bg-slate-50 border-t border-slate-200">
                        <td colspan="3" class="p-4 text-left font-bold text-slate-600">المصاريف الإدارية (10%)</td>
                        <td class="p-4 text-center font-bold text-slate-700 text-lg whitespace-nowrap w-px" x-text="formatCurrency(adminFees)"></td>
                        <td class="no-print"></td>
                    </tr>
                    <tr class="bg-slate-900 text-white border-t-4 border-emerald-500">
                        <td colspan="3" class="p-6 text-left font-black text-2xl tracking-wide">الإجمالي العام المستهدف</td>
                        <td class="p-6 text-center font-black text-3xl text-emerald-400 whitespace-nowrap w-px" x-text="formatCurrency(finalTotal)"></td>
                        <td class="no-print bg-slate-900"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
        
        <div class="print-header !border-none !mt-12 !mb-0 hidden flex-row justify-between px-10 text-center font-bold text-lg text-slate-800">
            <div><p class="mb-10">المحاسب</p><p>.............................</p></div>
            <div><p class="mb-10">مدير المشروع</p><p>.............................</p></div>
            <div><p class="mb-10">رئيس مجلس الإدارة</p><p>.............................</p></div>
        </div>
    </div>

    <script>
        // ضع الرابط الجديد للباك إند هنا بعد نشر كود Google Apps Script المرفق بالأسفل
        const API_URL = 'YOUR_NEW_WEB_APP_URL_HERE';

        function budgetApp() {
            return {
                loading: false, isManualEdit: false,
                selectedYear: new Date().getFullYear().toString(),
                items: [], form: { program: '', item: '', count: '', price: '' },

                async init() {
                    await this.fetchData();
                    this.$watch('selectedYear', () => this.fetchData());
                },
                async fetchData() {
                    try {
                        const res = await fetch(API_URL);
                        const data = await res.json();
                        this.items = data.filter(i => i.year == this.selectedYear);
                    } catch (e) { console.error('Error fetching', e); }
                },
                get groupedItems() {
                    return this.items.reduce((acc, item) => {
                        if (!acc[item.program]) acc[item.program] = [];
                        acc[item.program].push(item);
                        return acc;
                    }, {});
                },
                get grandTotal() { return this.items.reduce((sum, i) => sum + (i.count * i.price), 0); },
                get adminFees() { return this.grandTotal * 0.10; },
                get finalTotal() { return this.grandTotal + this.adminFees; },
                calculateSubtotal(group) { return group.reduce((sum, i) => sum + (i.count * i.price), 0); },
                formatCurrency(val) { return Number(val).toLocaleString('ar-EG') + ' ج.م'; },

                async saveEntry() {
                    this.loading = true;
                    const payload = { action: 'save', data: { ...this.form, year: this.selectedYear } };
                    await this.apiCall(payload);
                    this.form = { program: '', item: '', count: '', price: '' };
                    await this.fetchData();
                    this.loading = false;
                },
                async updateEntry(entry) { await this.apiCall({ action: 'save', data: entry }); },
                async deleteEntry(id) {
                    if (confirm('حذف هذا البند نهائياً؟')) {
                        await this.apiCall({ action: 'delete', id: id });
                        await this.fetchData();
                    }
                },
                async apiCall(payload) {
                    try {
                        await fetch(API_URL, {
                            method: 'POST',
                            body: JSON.stringify(payload)
                        });
                    } catch (e) { console.error(e); }
                }
            }
        }
    </script>
</body>
</html>
