<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصميم تفاصيل المباراة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        /* إخفاء أسهم الأرقام في حقول الإدخال */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen flex flex-col items-center py-10 px-4">

    <div x-data="matchApp()" class="w-full max-w-3xl bg-gradient-to-b from-[#1e293b] to-[#0f172a] border border-slate-700 rounded-3xl shadow-2xl overflow-hidden relative">
        
        <div class="absolute top-0 inset-x-0 h-40 bg-emerald-500/10 blur-3xl rounded-full"></div>

        <div class="relative text-center py-6 border-b border-slate-700/50">
            <input type="text" x-model="match.league" class="w-full text-center bg-transparent text-emerald-400 font-bold text-lg tracking-widest mb-1 focus:outline-none focus:bg-slate-800/50 rounded transition-colors" placeholder="اسم البطولة">
            <div class="flex justify-center items-center gap-2 text-slate-400 text-sm">
                <input type="text" x-model="match.date" class="text-center w-32 bg-transparent focus:outline-none focus:bg-slate-800/50 rounded transition-colors" placeholder="التاريخ">
                <span>•</span>
                <input type="text" x-model="match.stadium" class="text-center w-40 bg-transparent focus:outline-none focus:bg-slate-800/50 rounded transition-colors" placeholder="اسم الملعب">
            </div>
        </div>

        <div class="relative flex flex-col md:flex-row justify-between items-center px-6 py-12 gap-8 md:gap-0">
            
            <div class="flex flex-col items-center w-full md:w-1/3">
                <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center border-2 border-slate-600 mb-4 shadow-[0_0_20px_rgba(255,255,255,0.05)]">
                    <i class="fa-solid fa-shield-halved text-4xl text-slate-300"></i>
                </div>
                <input type="text" x-model="match.teamA" class="w-full text-center bg-transparent border-none text-3xl font-black text-white focus:outline-none focus:bg-slate-800/50 rounded transition-colors" placeholder="الفريق المضيف">
            </div>

            <div class="flex items-center justify-center gap-4 w-full md:w-1/3">
                <input type="text" x-model="match.scoreA" class="w-20 text-center bg-transparent border-none text-7xl font-black tabular-nums text-white focus:outline-none focus:bg-slate-800/50 rounded transition-colors">
                <div class="text-4xl text-slate-500 font-black mb-2">-</div>
                <input type="text" x-model="match.scoreB" class="w-20 text-center bg-transparent border-none text-7xl font-black tabular-nums text-white focus:outline-none focus:bg-slate-800/50 rounded transition-colors">
            </div>

            <div class="flex flex-col items-center w-full md:w-1/3">
                <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center border-2 border-slate-600 mb-4 shadow-[0_0_20px_rgba(255,255,255,0.05)]">
                    <i class="fa-solid fa-shield text-4xl text-slate-300"></i>
                </div>
                <input type="text" x-model="match.teamB" class="w-full text-center bg-transparent border-none text-3xl font-black text-white focus:outline-none focus:bg-slate-800/50 rounded transition-colors" placeholder="الفريق الضيف">
            </div>
        </div>

        <div class="p-6 md:p-10 bg-slate-800/30">
            <div class="flex justify-between items-center border-b border-slate-700 pb-4 mb-6">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-list-ul text-emerald-400"></i> أحداث المباراة
                </h3>
                <button @click="addEvent()" class="text-sm bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg transition-colors flex items-center gap-2 shadow-lg shadow-emerald-900/50">
                    <i class="fa-solid fa-plus"></i> إضافة حدث
                </button>
            </div>

            <div class="space-y-3">
                <template x-for="(event, index) in match.events" :key="index">
                    <div class="flex flex-wrap md:flex-nowrap items-center gap-3 p-4 rounded-xl bg-slate-800/60 border border-slate-700 hover:border-slate-500 transition-colors group">
                        
                        <div class="w-16">
                            <div class="relative flex items-center">
                                <input type="text" x-model="event.time" class="w-full text-center bg-slate-900/50 border border-slate-600 rounded-lg py-2 text-emerald-400 font-bold focus:outline-none focus:border-emerald-500" placeholder="د">
                                <span class="absolute left-2 text-slate-500 text-xs">'</span>
                            </div>
                        </div>

                        <select x-model="event.type" class="bg-slate-900/50 border border-slate-600 text-white rounded-lg p-2 text-sm focus:outline-none focus:border-emerald-500">
                            <option value="goal">هدف</option>
                            <option value="yellow">بطاقة صفراء</option>
                            <option value="red">بطاقة حمراء</option>
                            <option value="sub">تبديل</option>
                        </select>

                        <div class="w-8 flex justify-center text-lg">
                            <template x-if="event.type === 'goal'"><i class="fa-solid fa-futbol text-white"></i></template>
                            <template x-if="event.type === 'yellow'"><i class="fa-solid fa-note-sticky text-yellow-400"></i></template>
                            <template x-if="event.type === 'red'"><i class="fa-solid fa-note-sticky text-red-500"></i></template>
                            <template x-if="event.type === 'sub'"><i class="fa-solid fa-right-left text-emerald-400"></i></template>
                        </div>

                        <div class="flex-1 flex flex-col gap-1">
                            <input type="text" x-model="event.player1" class="w-full bg-transparent border-none text-lg font-bold text-white focus:outline-none focus:bg-slate-700/50 rounded px-2" placeholder="اسم اللاعب...">
                            <template x-if="event.type === 'sub'">
                                <input type="text" x-model="event.player2" class="w-full bg-transparent border-none text-sm text-slate-400 focus:outline-none focus:bg-slate-700/50 rounded px-2" placeholder="خروج اللاعب (اختياري)...">
                            </template>
                        </div>

                        <select x-model="event.team" class="bg-slate-900/50 border border-slate-600 text-white rounded-lg p-2 text-sm focus:outline-none focus:border-emerald-500">
                            <option value="A" x-text="match.teamA"></option>
                            <option value="B" x-text="match.teamB"></option>
                        </select>

                        <button @click="removeEvent(index)" class="w-10 h-10 flex items-center justify-center rounded-lg text-slate-500 hover:text-red-400 hover:bg-red-400/10 transition-colors">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </template>

                <template x-if="match.events.length === 0">
                    <div class="text-center py-8 text-slate-500 border-2 border-dashed border-slate-700 rounded-xl">
                        لا توجد أحداث مسجلة حتى الآن.
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('matchApp', () => ({
                match: {
                    league: 'دوري أبطال أوروبا',
                    date: '15 مايو 2026',
                    stadium: 'ملعب ويمبلي',
                    teamA: 'ريال مدريد',
                    teamB: 'بايرن ميونخ',
                    scoreA: '2',
                    scoreB: '1',
                    events: [
                        { time: '14', type: 'goal', player1: 'فينيسيوس جونيور', player2: '', team: 'A' },
                        { time: '32', type: 'yellow', player1: 'جوشوا كيميش', player2: '', team: 'B' },
                        { time: '65', type: 'sub', player1: 'توماس مولر', player2: 'ليروي ساني', team: 'B' },
                        { time: '88', type: 'goal', player1: 'جود بيلينجهام', player2: '', team: 'A' }
                    ]
                },
                addEvent() {
                    this.match.events.push({
                        time: '',
                        type: 'goal',
                        player1: '',
                        player2: '',
                        team: 'A'
                    });
                },
                removeEvent(index) {
                    this.match.events.splice(index, 1);
                }
            }))
        })
    </script>
</body>
</html>
