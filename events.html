<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير المباراة الرسمي - A4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                        num: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        print: {
                            bg: '#FFFFFF',
                            text: '#111827',
                            accent: '#4338CA', /* Indigo 700 - لون عصري ورسمي */
                            accentLight: '#EEF2FF',
                            border: '#E5E7EB',
                            card: '#F8FAFC'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* إعدادات عامة للشاشة */
        body { 
            background-color: #F1F5F9; 
            font-family: 'Tajawal', sans-serif;
            color: #111827;
            -webkit-font-smoothing: antialiased;
        }
        
        /* تأثيرات الحقول القابلة للتعديل */
        .editable {
            transition: all 0.2s ease;
            border: 1px solid transparent;
            border-radius: 0.375rem; 
            width: 100%;
        }
        .editable:hover {
            background-color: #F1F5F9;
            border-color: #CBD5E1;
        }
        .editable:focus {
            background-color: #FFFFFF;
            border-color: #4338CA;
            outline: none;
            box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.15);
        }

        /* تنسيق الأرقام بوضوح */
        .font-num { font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums; }

        /* ========================================= */
        /* == إعدادات الطباعة الـ A4 السحرية == */
        /* ========================================= */
        @media print {
            @page {
                size: A4 portrait;
                margin: 15mm; 
            }
            body {
                background-color: #FFFFFF !important;
                margin: 0 !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .no-print { display: none !important; }
            
            /* حاوية الورقة الرئيسية */
            .print-paper {
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                border: none !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                background-color: #FFFFFF !important;
            }

            .editable {
                border: none !important;
                background-color: transparent !important;
                padding: 0 !important;
                appearance: none !important; 
                -moz-appearance: none !important;
                -webkit-appearance: none !important;
            }
            
            select.editable { display: none !important; }
            .print-team-label { 
                display: block !important; 
                white-space: normal !important; /* السماح بكسر السطر للأسماء الطويلة */
            }

            .event-item {
                display: grid !important;
                grid-template-columns: auto auto 1fr auto !important; /* شكل الشبكة في الطباعة */
                padding-top: 0.5rem !important;
                padding-bottom: 0.5rem !important;
                margin-bottom: 0.5rem !important;
                font-size: 0.875rem !important; 
            }
            
            /* الحفاظ على ترتيب الشبكة في الطباعة */
            .print-header-grid {
                display: flex !important;
                flex-direction: row !important;
                justify-content: space-between !important;
            }
            .print-score-grid {
                display: grid !important;
                grid-template-columns: 1fr auto 1fr !important;
            }
        }

        .print-team-label { display: none; }
    </style>
</head>
<body x-data="matchApp()">

    <div class="w-full max-w-[210mm] mx-auto mt-4 mb-6 px-4 no-print flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-print-border">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-file-contract text-print-accent text-2xl"></i>
            <h1 class="text-xl font-bold text-gray-800">محرر تقارير المباريات الرسمية</h1>
        </div>
        <div class="flex flex-wrap justify-center gap-3 w-full sm:w-auto">
            <button @click="resetData()" class="flex-1 sm:flex-none px-4 py-2 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 transition-colors text-sm font-semibold flex items-center justify-center gap-2 border border-red-200">
                <i class="fa-solid fa-trash-can"></i> مسح
            </button>
            <button onclick="window.print()" class="flex-1 sm:flex-none px-6 py-2 rounded-lg bg-print-accent hover:bg-indigo-800 text-white transition-colors shadow-md shadow-indigo-500/30 font-bold flex items-center justify-center gap-2">
                <i class="fa-solid fa-print"></i> طباعة التقرير
            </button>
        </div>
    </div>

    <div class="print-paper w-full max-w-[210mm] mx-auto bg-white border border-print-border shadow-2xl md:rounded-lg overflow-hidden mb-12 p-4 md:p-[15mm] relative">
        
        <div class="print-header-grid flex flex-col md:flex-row justify-between items-start border-b-2 border-print-accent pb-6 mb-8 gap-4">
            <div class="flex flex-col gap-1.5 w-full md:flex-1">
                <input type="text" x-model="match.league" class="editable font-extrabold text-xl md:text-2xl text-print-text px-2 py-1 -ml-2" placeholder="اسم البطولة/الدوري">
                <div class="flex flex-wrap md:flex-nowrap items-center gap-4 text-gray-600 text-sm mt-1">
                    <div class="flex items-center gap-2">
                        <i class="fa-regular fa-calendar-days text-print-accent"></i>
                        <input type="text" x-model="match.date" class="editable font-num px-1.5 py-0.5 w-28" placeholder="التاريخ">
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-location-dot text-print-accent"></i>
                        <input type="text" x-model="match.stadium" class="editable px-1.5 py-0.5 min-w-[150px]" placeholder="الملعب">
                    </div>
                </div>
            </div>
            <div class="text-right md:text-left w-full md:w-auto flex flex-row md:flex-col justify-between items-center md:items-end">
                <div class="font-bold text-lg text-print-text">تقرير مباراة</div>
                <div class="text-sm text-gray-500 font-num flex items-center gap-1">REF: #<input type="text" x-model="match.refId" class="editable w-16 text-left" placeholder="000"></div>
            </div>
        </div>

        <div class="print-score-grid flex flex-col md:grid md:grid-cols-[1fr,auto,1fr] items-center gap-6 md:gap-8 py-8 mb-8 bg-print-card rounded-2xl border border-print-border px-4 md:px-8">
            
            <div class="flex flex-col items-center gap-3 text-center w-full">
                <label class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-white border-2 border-dashed border-gray-300 hover:border-print-accent flex items-center justify-center shadow-sm cursor-pointer overflow-hidden relative group transition-colors">
                    <input type="file" accept="image/*" class="hidden no-print" @change="uploadLogo($event, 'A')">
                    <template x-if="match.logoA">
                        <img :src="match.logoA" class="w-full h-full object-cover">
                    </template>
                    <template x-if="!match.logoA">
                        <div class="text-center no-print group-hover:text-print-accent text-gray-400">
                            <i class="fa-solid fa-cloud-arrow-up text-2xl mb-1 block"></i>
                        </div>
                    </template>
                    <i class="fa-solid fa-shield-halved text-4xl text-gray-200 print:block" x-show="!match.logoA" :class="{'hidden': true}"></i>
                </label>
                <input type="text" x-model="match.teamA" class="editable text-center text-2xl md:text-3xl font-extrabold text-print-text px-2 py-1" placeholder="الفريق المضيف">
            </div>

            <div class="flex items-center justify-center gap-4 bg-white border border-print-border px-6 py-4 rounded-2xl shadow-sm w-full md:w-auto">
                <input type="text" x-model="match.scoreA" class="editable w-12 md:w-16 text-center text-5xl md:text-7xl font-num font-extrabold text-print-accent p-0" placeholder="0">
                <div class="text-4xl md:text-5xl font-extrabold text-gray-300">-</div>
                <input type="text" x-model="match.scoreB" class="editable w-12 md:w-16 text-center text-5xl md:text-7xl font-num font-extrabold text-print-text p-0" placeholder="0">
            </div>

            <div class="flex flex-col items-center gap-3 text-center w-full">
                <label class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-white border-2 border-dashed border-gray-300 hover:border-print-accent flex items-center justify-center shadow-sm cursor-pointer overflow-hidden relative group transition-colors">
                    <input type="file" accept="image/*" class="hidden no-print" @change="uploadLogo($event, 'B')">
                    <template x-if="match.logoB">
                        <img :src="match.logoB" class="w-full h-full object-cover">
                    </template>
                    <template x-if="!match.logoB">
                        <div class="text-center no-print group-hover:text-print-accent text-gray-400">
                            <i class="fa-solid fa-cloud-arrow-up text-2xl mb-1 block"></i>
                        </div>
                    </template>
                    <i class="fa-solid fa-shield text-4xl text-gray-200 print:block" x-show="!match.logoB" :class="{'hidden': true}"></i>
                </label>
                <input type="text" x-model="match.teamB" class="editable text-center text-2xl md:text-3xl font-extrabold text-print-text px-2 py-1" placeholder="الفريق الضيف">
            </div>
        </div>

        <div class="mb-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6 pb-2 border-b border-print-border">
                <h3 class="text-lg md:text-xl font-bold flex items-center gap-2.5 text-print-text w-full md:w-auto">
                    <i class="fa-solid fa-clipboard-list text-print-accent"></i>
                    سجل أحداث المباراة
                </h3>
                <button @click="addEvent()" class="no-print w-full md:w-auto bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center justify-center gap-2 text-sm font-semibold">
                    <i class="fa-solid fa-plus"></i> إضافة حدث
                </button>
            </div>

            <div class="space-y-3">
                <template x-for="(event, index) in match.events" :key="index">
                    <div class="event-item flex flex-col md:grid md:grid-cols-[auto,auto,1fr,auto,auto] items-start md:items-center gap-3 p-3 rounded-lg bg-white border border-print-border hover:border-print-accent transition-all relative group">
                        
                        <div class="flex items-center gap-3 w-full md:w-auto md:contents">
                            <div class="w-14 shrink-0 flex items-center gap-1 font-num font-bold text-lg text-print-accent bg-print-accentLight px-2.5 py-1.5 rounded-md border border-indigo-100">
                                <input type="text" x-model="event.time" class="editable w-full text-center p-0 font-bold bg-transparent" placeholder="00">
                                <span class="text-xs text-indigo-400">'</span>
                            </div>

                            <div class="w-8 shrink-0 flex justify-center event-icon text-xl">
                                <template x-if="event.type === 'goal'"><i class="fa-solid fa-futbol text-gray-800" title="هدف"></i></template>
                                <template x-if="event.type === 'yellow'"><i class="fa-solid fa-square text-yellow-400 drop-shadow-sm" title="بطاقة صفراء"></i></template>
                                <template x-if="event.type === 'red'"><i class="fa-solid fa-square text-red-600 drop-shadow-sm" title="بطاقة حمراء"></i></template>
                                <template x-if="event.type === 'sub'"><i class="fa-solid fa-right-left text-print-accent" title="تبديل"></i></template>
                            </div>

                            <div class="flex flex-col flex-1 min-w-0">
                                <input type="text" x-model="event.player1" class="editable text-base font-semibold text-print-text px-1 py-0.5" placeholder="اسم اللاعب...">
                                <template x-if="event.type === 'sub'">
                                    <div class="flex items-center gap-1.5 text-xs text-gray-500 mt-0.5">
                                        <i class="fa-solid fa-arrow-turn-down text-red-500 flip-x"></i>
                                        <input type="text" x-model="event.player2" class="editable flex-1 text-gray-500 px-1 py-0" placeholder="اللاعب الخارج...">
                                    </div>
                                </template>
                            </div>
                            
                            <button @click="removeEvent(index)" class="no-print md:hidden w-8 h-8 flex items-center justify-center rounded-full text-red-400 bg-red-50">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="flex gap-2 no-print w-full md:w-auto mt-2 md:mt-0">
                            <select x-model="event.team" class="editable flex-1 md:w-auto bg-gray-50 border border-gray-300 text-print-text rounded-md px-2 py-2 md:py-1.5 text-sm md:text-xs font-medium focus:ring-1 focus:ring-print-accent">
                                <option value="A">المضيف</option>
                                <option value="B">الضيف</option>
                            </select>
                            <select x-model="event.type" class="editable flex-1 md:w-auto bg-gray-50 border border-gray-300 text-print-text rounded-md px-2 py-2 md:py-1.5 text-sm md:text-xs font-medium focus:ring-1 focus:ring-print-accent">
                                <option value="goal">هدف</option>
                                <option value="yellow">إنذار</option>
                                <option value="red">طرد</option>
                                <option value="sub">تبديل</option>
                            </select>
                        </div>

                        <div class="print-team-label text-sm font-bold text-gray-600 md:max-w-[150px] text-left">
                            <span x-text="event.team === 'A' ? match.teamA : match.teamB"></span>
                        </div>

                        <button @click="removeEvent(index)" class="no-print hidden md:flex opacity-0 group-hover:opacity-100 transition-opacity w-8 h-8 items-center justify-center rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors ml-1">
                            <i class="fa-solid fa-times text-lg"></i>
                        </button>
                    </div>
                </template>

                <template x-if="match.events.length === 0">
                    <div class="text-center py-10 text-gray-400 border-2 border-dashed border-print-border rounded-lg bg-print-card">
                        <i class="fa-regular fa-folder-open text-3xl mb-3 block"></i>
                        لا توجد أحداث مسجلة.
                    </div>
                </template>
            </div>
        </div>

        <div class="mt-8 pt-8 border-t border-print-border print:fixed print:bottom-[15mm] print:left-[15mm] print:right-[15mm]">
            <div class="grid grid-cols-2 gap-10 text-center text-sm text-gray-600">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-full max-w-[150px] h-12 border-b border-gray-400 border-dashed"></div>
                    <div class="font-bold mt-1">توقيع حكم المباراة</div>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-full max-w-[150px] h-12 border-b border-gray-400 border-dashed"></div>
                    <div class="font-bold mt-1">توقيع مراقب المباراة</div>
                </div>
            </div>
            <div class="text-center text-xs text-gray-400 mt-6 font-num">تم إنشاء هذا التقرير إلكترونياً • <span x-text="new Date().toLocaleDateString('ar-EG')"></span></div>
        </div>

    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            const defaultData = {
                league: 'نهائي دوري أبطال أوروبا 2026',
                date: '30 مايو 2026',
                stadium: 'استاد مايكروسوفت آرينا - لندن',
                refId: 'UCL-FA-01',
                teamA: 'مانشستر سيتي',
                teamB: 'ريال مدريد',
                logoA: null, // تم إضافة اللوجو
                logoB: null,
                scoreA: '1',
                scoreB: '2',
                events: [
                    { time: '12', type: 'yellow', player1: 'رودري', player2: '', team: 'A' },
                    { time: '26', type: 'goal', player1: 'جود بيلينغهام', player2: '', team: 'B' },
                    { time: '41', type: 'yellow', player1: 'إيدير ميليتاو', player2: '', team: 'B' },
                    { time: '55', type: 'goal', player1: 'إرلينغ هالاند', player2: '', team: 'A' },
                    { time: '68', type: 'sub', player1: 'لوكا مودريتش', player2: 'توني كروس', team: 'B' },
                    { time: '75', type: 'sub', player1: 'جيريمي دوكو', player2: 'جاك غريليتش', team: 'A' },
                    { time: '89', type: 'goal', player1: 'فينيسيوس جونيور', player2: '', team: 'B' },
                    { time: '90+2', type: 'red', player1: 'كايل ووكر', player2: '', team: 'A' }
                ]
            };

            Alpine.data('matchApp', () => ({
                match: defaultData,
                
                init() {
                    const saved = localStorage.getItem('officialMatchReportA4_v2');
                    if (saved) {
                        try { this.match = JSON.parse(saved); } catch (e) { this.match = defaultData; }
                    }

                    this.$watch('match', (newValue) => {
                        localStorage.setItem('officialMatchReportA4_v2', JSON.stringify(newValue));
                    }, { deep: true });
                },

                // دالة قراءة الصورة محلياً
                uploadLogo(event, team) {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        if (team === 'A') this.match.logoA = e.target.result;
                        if (team === 'B') this.match.logoB = e.target.result;
                    };
                    reader.readAsDataURL(file);
                },

                addEvent() {
                    this.match.events.push({ time: '', type: 'goal', player1: '', player2: '', team: 'A' });
                },

                removeEvent(index) {
                    if(confirm('هل أنت متأكد من حذف هذا الحدث؟')) {
                        this.match.events.splice(index, 1);
                    }
                },

                resetData() {
                    if(confirm('هل أنت متأكد من مسح كافة البيانات؟ لا يمكن التراجع.')) {
                        this.match = { ...defaultData, events: [], logoA: null, logoB: null }; 
                        localStorage.removeItem('officialMatchReportA4_v2');
                    }
                }
            }))
        })
    </script>
</body>
</html>
