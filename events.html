<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير المباراة الرسمي - A4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                        num: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        print: {
                            bg: '#FFFFFF',
                            text: '#1F2937',
                            accent: '#2563EB', /* Blue */
                            border: '#E5E7EB',
                            card: '#F9FAFB'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* إعدادات عامة للشاشة */
        body { 
            background-color: #F3F4F6; /* الرمادي الفاتح للخلفية بعيداً عن الورقة */
            font-family: 'Tajawal', sans-serif;
            color: #1F2937;
            -webkit-font-smoothing: antialiased;
        }
        
        /* تأثيرات الحقول القابلة للتعديل */
        .editable {
            transition: all 0.2s ease;
            border: 1px solid transparent;
            border-radius: 0.375rem; /* rounded-md */
        }
        .editable:hover {
            background-color: #F3F4F6;
            border-color: #D1D5DB;
        }
        .editable:focus {
            background-color: #FFFFFF;
            border-color: #2563EB;
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* تنسيق الأرقام بوضوح */
        .font-num { font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums; }

        /* ========================================= */
        /* == إعدادات الطباعة الـ A4 السحرية == */
        /* ========================================= */
        @media print {
            @page {
                size: A4 portrait;
                margin: 15mm; /* هوامش ضيقة لتسيع البيانات */
            }
            body {
                background-color: #FFFFFF !important;
                margin: 0 !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .no-print { display: none !important; }
            
            /* حاوية الورقة الرئيسية */
            .print-paper {
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                border: none !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                background-color: #FFFFFF !important;
            }

            /* تنسيق الحقول عند الطباعة (إزالة أي خلفيات أو حدود) */
            .editable {
                border: none !important;
                background-color: transparent !important;
                padding: 0 !important;
                appearance: none !important; /* لإزالة أسهم الـ select */
                -moz-appearance: none !important;
                -webkit-appearance: none !important;
            }
            
            /* إجبار تحديد الفريق على الاختفاء واستبداله بنص عادي */
            select.editable { display: none !important; }
            .print-team-label { display: block !important; }

            /* تقليص حجم الأحداث لتناسب صفحة واحدة إذا كانت كثيرة */
            .event-item {
                padding-top: 0.5rem !important;
                padding-bottom: 0.5rem !important;
                margin-bottom: 0.5rem !important;
                font-size: 0.875rem !important; /* text-sm */
            }
            .event-icon { font-size: 1.125rem !important; } /* text-lg */
        }

        /* كلاس خاص لعرض اسم الفريق المطبوع فقط */
        .print-team-label { display: none; }
    </style>
</head>
<body x-data="matchApp()">

    <div class="w-full max-w-[210mm] mx-auto my-6 px-4 no-print flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-print-border">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-file-contract text-print-accent text-2xl"></i>
            <h1 class="text-xl font-bold text-gray-800">محرر تقارير المباريات الرسمية</h1>
        </div>
        <div class="flex gap-3">
            <button @click="resetData()" class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 transition-colors text-sm font-semibold flex items-center gap-2">
                <i class="fa-solid fa-trash-can"></i> مسح البيانات
            </button>
            <button onclick="window.print()" class="px-6 py-2 rounded-lg bg-print-accent hover:bg-blue-700 text-white transition-colors shadow-md shadow-blue-500/20 font-bold flex items-center gap-2">
                <i class="fa-solid fa-print"></i> طباعة تقرير A4
            </button>
        </div>
    </div>

    <div class="print-paper w-full max-w-[210mm] mx-auto bg-white border border-print-border shadow-xl rounded-sm overflow-hidden mb-12 p-[15mm] relative">
        
        <div class="flex justify-between items-start border-b-2 border-print-accent pb-6 mb-8">
            <div class="flex flex-col gap-1.5 flex-1">
                <input type="text" x-model="match.league" class="editable font-extrabold text-2xl text-print-text px-2 py-1 -ml-2 w-full" placeholder="اسم البطولة/الدوري">
                <div class="flex items-center gap-4 text-gray-600 text-sm mt-1">
                    <div class="flex items-center gap-2">
                        <i class="fa-regular fa-calendar-days text-print-accent"></i>
                        <input type="text" x-model="match.date" class="editable font-num px-1.5 py-0.5" placeholder="التاريخ">
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-location-dot text-print-accent"></i>
                        <input type="text" x-model="match.stadium" class="editable px-1.5 py-0.5" placeholder="الملعب">
                    </div>
                </div>
            </div>
            <div class="text-left">
                <div class="font-bold text-lg text-print-text">تقرير مباراة</div>
                <div class="text-sm text-gray-500 font-num">REF: #<input type="text" x-model="match.refId" class="editable w-16 text-left" placeholder="000"></div>
            </div>
        </div>

        <div class="grid grid-cols-[1fr,auto,1fr] items-center gap-6 py-10 mb-8 bg-print-card rounded-xl border border-print-border px-8">
            
            <div class="flex flex-col items-center gap-3 text-center">
                <div class="w-24 h-24 rounded-full bg-white border border-print-border flex items-center justify-center shadow-inner">
                    <i class="fa-solid fa-shield-halved text-5xl text-gray-300"></i>
                </div>
                <input type="text" x-model="match.teamA" class="editable w-full text-center text-3xl font-extrabold text-print-text px-2 py-1" placeholder="الفريق المضيف">
            </div>

            <div class="flex items-center justify-center gap-4 bg-white border border-print-border px-8 py-5 rounded-2xl shadow-sm">
                <input type="text" x-model="match.scoreA" class="editable w-16 text-center text-7xl font-num font-extrabold text-print-text p-0" placeholder="0">
                <div class="text-5xl font-extrabold text-gray-300">-</div>
                <input type="text" x-model="match.scoreB" class="editable w-16 text-center text-7xl font-num font-extrabold text-print-text p-0" placeholder="0">
            </div>

            <div class="flex flex-col items-center gap-3 text-center">
                <div class="w-24 h-24 rounded-full bg-white border border-print-border flex items-center justify-center shadow-inner">
                    <i class="fa-solid fa-shield text-5xl text-gray-300"></i>
                </div>
                <input type="text" x-model="match.teamB" class="editable w-full text-center text-3xl font-extrabold text-print-text px-2 py-1" placeholder="الفريق الضيف">
            </div>
        </div>

        <div class="mb-6">
            <div class="flex justify-between items-center mb-6 pb-2 border-b border-print-border">
                <h3 class="text-xl font-bold flex items-center gap-2.5 text-print-text">
                    <i class="fa-solid fa-clipboard-list text-print-accent"></i>
                    سجل أحداث المباراة
                </h3>
                <button @click="addEvent()" class="no-print bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center gap-2 text-sm font-semibold">
                    <i class="fa-solid fa-plus"></i> إضافة حدث جديد
                </button>
            </div>

            <div class="space-y-3">
                <template x-for="(event, index) in match.events" :key="index">
                    <div class="event-item grid grid-cols-[auto,auto,1fr,auto,auto] items-center gap-x-4 gap-y-1 p-3 rounded-lg bg-white border border-print-border hover:border-gray-300 hover:bg-print-card transition-all relative group">
                        
                        <div class="w-14 flex items-center gap-1 font-num font-bold text-lg text-print-accent bg-print-card px-2.5 py-1.5 rounded-md border border-print-border">
                            <input type="text" x-model="event.time" class="editable w-full text-center p-0 font-bold" placeholder="00">
                            <span class="text-xs text-gray-400">'</span>
                        </div>

                        <div class="w-9 flex justify-center event-icon text-xl">
                            <template x-if="event.type === 'goal'"><i class="fa-solid fa-futbol text-gray-800" title="هدف"></i></template>
                            <template x-if="event.type === 'yellow'"><i class="fa-solid fa-square text-yellow-400" title="بطاقة صفراء"></i></template>
                            <template x-if="event.type === 'red'"><i class="fa-solid fa-square text-red-600" title="بطاقة حمراء"></i></template>
                            <template x-if="event.type === 'sub'"><i class="fa-solid fa-right-left text-print-accent" title="تبديل"></i></template>
                        </div>

                        <div class="flex flex-col flex-1 min-w-0">
                            <input type="text" x-model="event.player1" class="editable w-full text-base font-semibold text-print-text px-1 py-0.5" placeholder="اسم اللاعب...">
                            <template x-if="event.type === 'sub'">
                                <div class="flex items-center gap-1.5 text-xs text-gray-500 mt-0.5">
                                    <i class="fa-solid fa-arrow-turn-down text-red-500 flip-x"></i>
                                    <input type="text" x-model="event.player2" class="editable flex-1 text-gray-500 px-1 py-0" placeholder="اللاعب الخارج...">
                                </div>
                            </template>
                        </div>

                        <div class="flex gap-2 no-print">
                            <select x-model="event.team" class="editable bg-white border border-gray-300 text-print-text rounded-md px-2 py-1.5 text-xs font-medium focus:ring-1 focus:ring-print-accent">
                                <option value="A">المضيف</option>
                                <option value="B">الضيف</option>
                            </select>
                            <select x-model="event.type" class="editable bg-white border border-gray-300 text-print-text rounded-md px-2 py-1.5 text-xs font-medium focus:ring-1 focus:ring-print-accent">
                                <option value="goal">هدف</option>
                                <option value="yellow">إنذار</option>
                                <option value="red">طرد</option>
                                <option value="sub">تبديل</option>
                            </select>
                        </div>

                        <div class="print-team-label text-sm font-bold text-gray-600 w-28 text-left">
                            <span x-text="event.team === 'A' ? match.teamA : match.teamB"></span>
                        </div>

                        <button @click="removeEvent(index)" class="no-print opacity-0 group-hover:opacity-100 transition-opacity w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors ml-1">
                            <i class="fa-solid fa-times text-lg"></i>
                        </button>
                    </div>
                </template>

                <template x-if="match.events.length === 0">
                    <div class="text-center py-10 text-gray-400 border-2 border-dashed border-print-border rounded-lg bg-print-card">
                        <i class="fa-regular fa-folder-open text-3xl mb-3 block"></i>
                        لا توجد أحداث مسجلة لهذا التقرير.
                    </div>
                </template>
            </div>
        </div>

        <div class="mt-auto pt-10 border-t border-print-border print:fixed print:bottom-[15mm] print:left-[15mm] print:right-[15mm]">
            <div class="grid grid-cols-2 gap-10 text-center text-sm text-gray-600">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-full h-16 border-b-2 border-gray-300 border-dashed"></div>
                    <div class="font-bold">توقيع حكم المباراة</div>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-full h-16 border-b-2 border-gray-300 border-dashed"></div>
                    <div class="font-bold">توقيع مراقب المباراة</div>
                </div>
            </div>
            <div class="text-center text-xs text-gray-400 mt-8 font-num">تم إنشاء هذا التقرير إلكترونياً • <span x-text="new Date().toLocaleDateString('ar-EG')"></span></div>
        </div>

    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            // بيانات افتراضية قوية لعرض التصميم
            const defaultData = {
                league: 'نهائي دوري أبطال أوروبا 2026',
                date: '30 مايو 2026',
                stadium: 'استاد مايكروسوفت آرينا - لندن',
                refId: 'UCL-FA-01',
                teamA: 'مانشستر سيتي',
                teamB: 'ريال مدريد',
                scoreA: '1',
                scoreB: '2',
                events: [
                    { time: '12', type: 'yellow', player1: 'رودري', player2: '', team: 'A' },
                    { time: '26', type: 'goal', player1: 'جود بيلينغهام', player2: '', team: 'B' },
                    { time: '41', type: 'yellow', player1: 'إيدير ميليتاو', player2: '', team: 'B' },
                    { time: '55', type: 'goal', player1: 'إرلينغ هالاند', player2: '', team: 'A' },
                    { time: '68', type: 'sub', player1: 'لوكا مودريتش', player2: 'توني كروس', team: 'B' },
                    { time: '75', type: 'sub', player1: 'جيريمي دوكو', player2: 'جاك غريليتش', team: 'A' },
                    { time: '89', type: 'goal', player1: 'فينيسيوس جونيور', player2: '', team: 'B' },
                    { time: '90+2', type: 'red', player1: 'كايل ووكر', player2: '', team: 'A' }
                ]
            };

            Alpine.data('matchApp', () => ({
                match: defaultData,
                
                init() {
                    // تحميل البيانات من localStorage إذا وجدت
                    const saved = localStorage.getItem('officialMatchReportA4');
                    if (saved) {
                        try { this.match = JSON.parse(saved); } catch (e) { this.match = defaultData; }
                    }

                    // مراقبة وحفظ أي تغيير تلقائياً
                    this.$watch('match', (newValue) => {
                        localStorage.setItem('officialMatchReportA4', JSON.stringify(newValue));
                    }, { deep: true });
                },

                addEvent() {
                    this.match.events.push({ time: '', type: 'goal', player1: '', player2: '', team: 'A' });
                    // ترتيب الأحداث تلقائياً حسب الوقت بعد كل إضافة (اختياري، يحتاج دالة بارسر للدقائق)
                },

                removeEvent(index) {
                    if(confirm('هل أنت متأكد من حذف هذا الحدث؟')) {
                        this.match.events.splice(index, 1);
                    }
                },

                resetData() {
                    if(confirm('هل أنت متأكد من مسح كافة البيانات؟ لا يمكن التراجع.')) {
                        this.match = { ...defaultData, events: [] }; // إعادة للقيم الافتراضية مع تصفير الأحداث
                        localStorage.removeItem('officialMatchReportA4');
                    }
                }
            }))
        })
    </script>
</body>
</html>
